<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <title>Hello, world!</title>
</head>
<body>

<div class="container">
        <h2 class="mb-4">Employee Form</h2>

        <form th:action="@{/save}" th:object="${employee}" method="post">

            <input type="hidden" th:field="*{id}"/>
            <!-- Name -->
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" placeholder="Enter name" th:field="*{name}">
            </div>

            <!-- Salary -->
            <div class="mb-3">
                <label  class="form-label">Salary</label>
                <input type="number" class="form-control" placeholder="Enter salary" th:field="*{salary}">
            </div>

            <!-- Designation -->
            <div class="mb-3">
                <label class="form-label">Designation</label>
                <input type="text" class="form-control" placeholder="Enter designation" th:field="*{designation}">
            </div>

            <!-- Submit Button -->
            <button type="submit" class="btn btn-primary">Submit</button>

        </form>

    </div>










<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>

</body>
</html>
